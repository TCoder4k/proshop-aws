services:
  mongo:
    image: mongo:5.0
    container_name: proshop-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: proshop
    volumes:
      - mongo_data:/data/db
    networks:
      - proshop-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: proshop-backend
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    env_file:
      - .env
    volumes:
      - uploads_data:/app/uploads
    networks:
      - proshop-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: proshop-frontend
    restart: unless-stopped
    networks:
      - proshop-net

  nginx:
    image: nginx:1.25-alpine
    container_name: proshop-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - proshop-net

volumes:
  mongo_data:
  uploads_data:

networks:
  proshop-net:
    driver: bridge
